<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PetSaathi - Edit Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007f80",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2323",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 sticky top-0 z-10 border-b border-primary/10">
<div class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight flex-1 text-center">Edit Profile</h2>
<div class="flex w-10 items-center justify-end">
<button class="text-primary">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto pb-24">
<!-- Profile Avatar Section -->
<div class="flex p-6">
<div class="flex w-full flex-col gap-4 items-center">
<div class="relative">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 border-4 border-primary/20" data-alt="Professional portrait of a pet owner smiling" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDNXKmU9cM44cIhL4RaYpbDkocL7HHBjV8OcVhcdWGY36jb2w9NRz5y-dMaxU1cNAnWHl0lEqMDP7g1UsjAqAqYZMk6lZEuug5GJGKPlKI0WayzW2gb7znm6-afzE7XPA--jw2a1J6s7ZomTGJiK7lvqk7pFaFyz58Utc0-ASlaS-jOgzXXyORLk6tT1mPbpjj3AxElByOPjI-iwK-dS8d4wNJJ7uDCdkeTpJ0aMWZ2j6SF2JKWA77EmV60D6tOZIsxfF_tupXgyQ");'>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg border-2 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<div class="flex flex-col items-center justify-center">
<p class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">Alex Johnson</p>
<p class="text-primary text-sm font-semibold uppercase tracking-wider">Pet Owner</p>
</div>
</div>
</div>
<!-- Form Section -->
<div class="px-4 space-y-6">
<!-- Personal Info -->
<div class="space-y-4">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold px-1">Personal Details</h3>
<div class="flex flex-col gap-1">
<label class="text-slate-600 dark:text-slate-400 text-sm font-medium px-1">Full Name</label>
<input class="w-full rounded-xl border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-14 px-4 shadow-sm transition-all" type="text" value="Alex Johnson"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-600 dark:text-slate-400 text-sm font-medium px-1">Role</label>
<select class="w-full rounded-xl border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-14 px-4 shadow-sm appearance-none">
<option selected="" value="owner">Pet Owner</option>
<option value="walker">Pet Walker</option>
<option value="both">Both</option>
</select>
</div>
</div>
<!-- Preferences -->
<div class="space-y-4 pt-2">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold px-1">Preferences &amp; Availability</h3>
<div class="flex flex-col gap-1">
<label class="text-slate-600 dark:text-slate-400 text-sm font-medium px-1">Preferred Dog Types</label>
<input class="w-full rounded-xl border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-14 px-4 shadow-sm transition-all" placeholder="e.g. Golden Retriever, Beagle, Small breeds" type="text" value="Golden Retrievers, Poodles"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-600 dark:text-slate-400 text-sm font-medium px-1">Available Time Slots</label>
<div class="grid grid-cols-2 gap-2">
<div class="flex items-center gap-2 p-3 rounded-xl border border-primary/20 bg-primary/5">
<span class="material-symbols-outlined text-primary text-sm">calendar_today</span>
<span class="text-sm">Weekends</span>
</div>
<div class="flex items-center gap-2 p-3 rounded-xl border border-primary/20 bg-primary/5">
<span class="material-symbols-outlined text-primary text-sm">schedule</span>
<span class="text-sm">6 PM - 9 PM</span>
</div>
</div>
<button class="mt-2 text-primary text-sm font-bold flex items-center gap-1">
<span class="material-symbols-outlined text-sm">add_circle</span>
                            Add more slots
                        </button>
</div>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                        Save Changes
                    </button>
</div>
</div>
</div>
<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 border-t border-primary/10 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2 flex justify-between items-center z-20">
<a class="flex flex-1 flex-col items-center gap-1 text-primary/60" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium">Home</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary/60" href="#">
<span class="material-symbols-outlined">search</span>
<p class="text-[10px] font-medium">Explore</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary/60" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<p class="text-[10px] font-medium">Chats</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">person</span>
<p class="text-[10px] font-medium">Profile</p>
</a>
</div>
</div>
</body></html>
